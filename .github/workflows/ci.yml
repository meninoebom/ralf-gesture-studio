name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR when new commits land.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 system libraries. The library + integration tests don't link
      # the GUI, but the package's build.rs (tauri-build) runs on any cargo
      # invocation, so install the deps for safety.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Gate 1: formatting. `main` is kept fmt-clean; this prevents drift.
      - name: Format check
        run: cargo fmt --all --check

      # Advisory: surface clippy findings without blocking the merge. The repo
      # carries some pre-existing lints; tighten to `-- -D warnings` once those
      # are cleared.
      - name: Clippy (advisory)
        run: cargo clippy --lib --tests
        continue-on-error: true

      # Gate 2: the real correctness check. Scoped to the lib + integration
      # tests (the GUI bin has no tests and pulls heavier link-time deps).
      # The #[ignore]d measurement harnesses are intentionally not run here.
      - name: Tests
        run: cargo test --lib --test recognition_integration
