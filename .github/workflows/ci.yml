name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR when new commits land.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libraries the LIB links: ALSA (rodio audio cues) and GTK (rfd
      # dialogs), plus the Tauri WebKit/GTK stack for build.rs. DEBIAN_FRONTEND
      # is required: without it Ubuntu 24.04's debconf/needrestart prompts hang
      # apt-get indefinitely on a non-interactive runner.
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Gate 1: formatting. `main` is kept fmt-clean; this prevents drift.
      - name: Format check
        run: cargo fmt --all --check

      # Advisory: surface clippy findings without blocking the merge. The repo
      # carries some pre-existing lints; tighten to `-- -D warnings` once those
      # are cleared.
      - name: Clippy (advisory)
        run: cargo clippy --lib --tests
        continue-on-error: true

      # Gate 2: the real correctness check. Scoped to the lib + integration
      # tests (the GUI bin has no tests and pulls heavier link-time deps).
      # The #[ignore]d measurement harnesses are intentionally not run here.
      #
      # Headless runners have no configured Documents dir, so the `directories`
      # crate's document_dir() returns None and default_vocabulary_dir() fails.
      # Provide an XDG user-dirs config (the mechanism the crate reads) so that
      # path resolution behaves like a real desktop.
      - name: Tests
        env:
          XDG_DOCUMENTS_DIR: ${{ github.workspace }}/Documents
        run: |
          mkdir -p "$HOME/.config" "${{ github.workspace }}/Documents"
          printf 'XDG_DOCUMENTS_DIR="%s/Documents"\n' "${{ github.workspace }}" \
            > "$HOME/.config/user-dirs.dirs"
          cargo test --lib --test recognition_integration
